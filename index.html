<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qazaq Style | Приглашение</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0a2e38 0%, #1c4b58 50%, #0d3742 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cormorant Garamond', serif;
            color: #fff;
            position: relative;
            overflow: hidden;
        }

        /* 🔥 Легкий орнамент по всему фону */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: url('https://www.transparenttextures.com/patterns/arabesque.png');
            opacity: 0.08;
        }

        /* 🔥 Орнаменты по углам */
        body::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background-image: 
                url('https://i.imgur.com/8QfZ6Yv.png'),
                url('https://i.imgur.com/8QfZ6Yv.png'),
                url('https://i.imgur.com/8QfZ6Yv.png'),
                url('https://i.imgur.com/8QfZ6Yv.png');
            background-repeat: no-repeat;
            background-size: 140px;
            background-position: 
                top 10px left 10px,
                top 10px right 10px,
                bottom 10px left 10px,
                bottom 10px right 10px;
            opacity: 0.6;
        }

        .card {
            position: relative;
            z-index: 2;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .title {
            font-size: 28px;
            margin-bottom: 15px;
        }

        .names {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .info {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .button {
            margin-top: 20px;
            display: inline-block;
            padding: 12px 25px;
            background: #ffffff;
            color: #0d3742;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
        }

        .button:hover {
            background: #ddd;
        }

    </style>
</head>

<body>

    <div class="card">
        <div class="title">Свадебное приглашение</div>

        <div class="names">Айбек & Айгерим</div>

        <div class="info">📅 25 июля 2026</div>
        <div class="info">📍 Ресторан "Астана"</div>
        <div class="info">⏰ 18:00</div>

        <a href="tel:+77000000000" class="button">Позвонить</a>
    </div>

</body>
</html>
