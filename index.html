<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Қазақ стилі | Базовое</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #f5efe6;
            background-image: 
                linear-gradient(45deg, rgba(0, 128, 128, 0.03) 25%, transparent 25%),
                linear-gradient(-45deg, rgba(0, 128, 128, 0.03) 25%, transparent 25%);
            background-size: 60px 60px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'Cormorant Garamond', 'Times New Roman', serif;
        }
        
        .card {
            max-width: 600px;
            width: 100%;
            background: #fffaf2;
            border-radius: 40px 40px 40px 40px;
            padding: 40px 30px;
            box-shadow: 0 30px 50px rgba(139, 69, 19, 0.15);
            position: relative;
            border: 2px solid #b68b6d;
        }
        
        /* Орнамент сверху */
        .ornament-top {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 30px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 30" width="100" height="30"><path d="M10,15 L20,5 L30,15 L40,5 L50,15 L60,5 L70,15 L80,5 L90,15" stroke="%23b22222" fill="none" stroke-width="2"/><path d="M10,25 L20,15 L30,25 L40,15 L50,25 L60,15 L70,25 L80,15 L90,25" stroke="%23008080" fill="none" stroke-width="2"/></svg>') repeat-x top;
            opacity: 0.8;
        }
        
        /* Орнамент снизу */
        .ornament-bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 30px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 30" width="100" height="30"><path d="M10,5 L20,15 L30,5 L40,15 L50,5 L60,15 L70,5 L80,15 L90,5" stroke="%23b22222" fill="none" stroke-width="2"/><path d="M10,15 L20,25 L30,15 L40,25 L50,15 L60,25 L70,15 L80,25 L90,15" stroke="%23008080" fill="none" stroke-width="2"/></svg>') repeat-x bottom;
            opacity: 0.8;
        }
        
        /* Угловые орнаменты */
        .corner {
            position: absolute;
            width: 70px;
            height: 70px;
            opacity: 0.4;
        }
        
        .corner-tl {
            top: 10px;
            left: 10px;
            background: radial-gradient(circle at 0 0, transparent 50%, #b68b6d 100%);
            border-top: 3px solid #b22222;
            border-left: 3px solid #008080;
        }
        
        .corner-tr {
            top: 10px;
            right: 10px;
            background: radial-gradient(circle at 100% 0, transparent 50%, #b68b6d 100%);
            border-top: 3px solid #b22222;
            border-right: 3px solid #008080;
        }
        
        .corner-bl {
            bottom: 10px;
            left: 10px;
            background: radial-gradient(circle at 0 100%, transparent 50%, #b68b6d 100%);
            border-bottom: 3px solid #b22222;
            border-left: 3px solid #008080;
        }
        
        .corner-br {
            bottom: 10px;
            right: 10px;
            background: radial-gradient(circle at 100% 100%, transparent 50%, #b68b6d 100%);
            border-bottom: 3px solid #b22222;
            border-right: 3px solid #008080;
        }
        
        .content {
            position: relative;
            z-index: 2;
            text-align: center;
        }
        
        /* Шаңырақ (символ) */
        .shanyrak {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            border: 3px solid #b68b6d;
            border-radius: 50%;
            position: relative;
            background: rgba(255, 255, 255, 0.5);
        }
        
        .shanyrak::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            background: #b22222;
            border-radius: 50%;
        }
        
        .shanyrak::after {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 100%;
            background: #b68b6d;
        }
        
        .shanyrak span {
            position: absolute;
            width: 2px;
            height: 100%;
            background: #b68b6d;
            transform-origin: center;
        }
        
        .shanyrak span:nth-child(1) { transform: rotate(45deg); }
        .shanyrak span:nth-child(2) { transform: rotate(90deg); }
        .shanyrak span:nth-child(3) { transform: rotate(135deg); }
        
        .event-type {
            font-size: 18px;
            letter-spacing: 4px;
            color: #008080;
            margin-bottom: 10px;
            text-transform: uppercase;
            font-weight: 500;
        }
        
        .couple {
            font-size: 48px;
            font-weight: 600;
            color: #b22222;
            margin-bottom: 15px;
            line-height: 1.2;
            font-family: 'Times New Roman', serif;
        }
        
        .couple span {
            display: inline-block;
            font-size: 32px;
            color: #008080;
            margin: 0 10px;
        }
        
        .kazakh-word {
            font-size: 16px;
            color: #b68b6d;
            font-style: italic;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }
        
        .date-box {
            background: linear-gradient(135deg, #fffaf2, #f0e4d5);
            border: 2px solid #b68b6d;
            border-radius: 100px;
            padding: 15px 25px;
            margin: 25px 0;
            box-shadow: inset 0 0 15px rgba(182, 139, 109, 0.2);
        }
        
        .date {
            font-size: 36px;
            font-weight: 600;
            color: #b22222;
            line-height: 1.2;
        }
        
        .date small {
            font-size: 18px;
            color: #008080;
            display: block;
        }
        
        .venue {
            font-size: 24px;
            color: #b68b6d;
            margin: 15px 0 5px;
            font-weight: 500;
        }
        
        .address {
            font-size: 18px;
            color: #008080;
            margin-bottom: 15px;
            font-style: italic;
        }
        
        .time {
            font-size: 20px;
            color: #b22222;
            margin: 20px 0;
            padding: 10px;
            border-top: 2px solid #008080;
            border-bottom: 2px solid #008080;
            display: inline-block;
        }
        
        .rsvp {
            margin: 30px 0 20px;
            padding: 20px;
            background: rgba(0, 128, 128, 0.05);
            border-radius: 30px;
        }
        
        .rsvp-label {
            font-size: 14px;
            letter-spacing: 2px;
            color: #b68b6d;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        
        .contact-button {
            display: inline-block;
            background: #b22222;
            color: white;
            padding: 15px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 18px;
            font-weight: 500;
            border: 2px solid #008080;
            transition: all 0.3s;
        }
        
        .contact-button:hover {
            background: #8b1a1a;
            transform: scale(1.02);
        }
        
        .organizer {
            margin-top: 25px;
            font-size: 18px;
            color: #b68b6d;
        }
        
        .organizer a {
            color: #008080;
            text-decoration: none;
            border-bottom: 1px dashed #008080;
        }
        
        .footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #b68b6d;
            font-size: 14px;
            color: #b68b6d;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        
        .footer span {
            color: #b22222;
        }
        
        @media (max-width: 480px) {
            .card { padding: 30px 20px; }
            .couple { font-size: 36px; }
            .date { font-size: 28px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- Орнаменты -->
        <div class="ornament-top"></div>
        <div class="ornament-bottom"></div>
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>
        
        <div class="content">
            <!-- Шаңырақ -->
            <div class="shanyrak">
                <span></span>
                <span></span>
                <span></span>
            </div>
            
            <!-- Тип мероприятия -->
            <div class="event-type">ҰЛТТЫҚ ТОЙ</div>
            
            <!-- Имена -->
            <h1 class="couple">
                ЕРБОЛ <span>&</span> АЙГҮЛ
            </h1>
            
            <div class="kazakh-word">Құтты болсын!</div>
            
            <!-- Дата -->
            <div class="date-box">
                <div class="date">
                    15 ТАМЫЗ 2026
                    <small>сәбі</small>
                </div>
            </div>
            
            <!-- Место -->
            <div class="venue">«АЛТЫН ОРДА»</div>
            <div class="address">Алматы облысы, Қарасай ауданы</div>
            
            <!-- Время -->
            <div class="time">
                Қонақтарды жинау 17:00 • Рәсім 18:00
            </div>
            
            <!-- RSVP -->
            <div class="rsvp">
                <div class="rsvp-label">ҚАТЫСУЫҢЫЗДЫ РАСТАҢЫЗ</div>
                <a href="https://wa.me/77771234567?text=Құрметті%20ЕРБОЛ%20және%20АЙГҮЛ!%20Мен%20тойға%20қатысамын" target="_blank" class="contact-button">
                    Ұйымдастырушы
                </a>
            </div>
            
            <!-- Организатор -->
            <div class="organizer">
                Ұйымдастырушы: <a href="tel:+77771234567">Айгүл, +7 (777) 123-45-67</a>
            </div>
            
            <!-- Футер -->
            <div class="footer">
                <span>АЛМАТЫ</span> • 2026
            </div>
        </div>
    </div>
</body>
</html>
