<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Казахский стиль | База</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #1a2e35 0%, #2c4a55 50%, #1e3b44 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'Cormorant Garamond', 'Times New Roman', serif;
            position: relative;
        }
        
        /* Мягкое свечение */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 30% 40%, rgba(200, 170, 100, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 70% 60%, rgba(100, 150, 170, 0.15) 0%, transparent 50%);
            pointer-events: none;
        }
        
        .card {
            max-width: 680px;
            width: 100%;
            background: #fcf5e8;
            border-radius: 80px 80px 80px 80px;
            padding: 60px 50px;
            box-shadow: 
                0 40px 70px -10px rgba(0, 0, 0, 0.7),
                0 0 0 3px #b69b7c,
                0 0 0 8px #e5d5b5,
                inset 0 0 40px rgba(212, 175, 55, 0.3);
            position: relative;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(182, 155, 124, 0.1) 0%, transparent 30%),
                radial-gradient(circle at 90% 80%, rgba(0, 102, 102, 0.1) 0%, transparent 30%);
        }
        
        /* Основной орнамент по верхнему краю */
        .ornament-top {
            position: absolute;
            top: 15px;
            left: 40px;
            right: 40px;
            height: 35px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 35" preserveAspectRatio="xMidYMid slice"><path d="M20,20 L35,5 L50,20 L65,5 L80,20 L95,5 L110,20 L125,5 L140,20 L155,5 L170,20" stroke="%238b5a2b" fill="none" stroke-width="2.5" opacity="0.5"/><path d="M30,25 L45,15 L60,25 L75,15 L90,25 L105,15 L120,25 L135,15 L150,25" stroke="%23006666" fill="none" stroke-width="2" opacity="0.5"/></svg>') repeat-x;
            background-size: 200px 35px;
            z-index: 5;
        }
        
        /* Орнамент по нижнему краю */
        .ornament-bottom {
            position: absolute;
            bottom: 15px;
            left: 40px;
            right: 40px;
            height: 35px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 35" preserveAspectRatio="xMidYMid slice"><path d="M20,15 L35,30 L50,15 L65,30 L80,15 L95,30 L110,15 L125,30 L140,15 L155,30 L170,15" stroke="%23006666" fill="none" stroke-width="2.5" opacity="0.5"/><path d="M30,10 L45,25 L60,10 L75,25 L90,10 L105,25 L120,10 L135,25 L150,10" stroke="%238b5a2b" fill="none" stroke-width="2" opacity="0.5"/></svg>') repeat-x;
            background-size: 200px 35px;
            z-index: 5;
        }
        
        /* Угловые орнаменты - кошкар муйиз */
        .corner {
            position: absolute;
            width: 120px;
            height: 120px;
            z-index: 10;
            filter: drop-shadow(0 5px 8px rgba(139, 69, 19, 0.3));
        }
        
        .corner-tl {
            top: -5px;
            left: -5px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120"><path d="M30,30 L45,10 L70,10 L85,30 L70,50 L85,70 L70,90 L45,90 L30,70 L45,50 L30,30Z" fill="none" stroke="%238b5a2b" stroke-width="3" opacity="0.7"/><path d="M45,45 L57,28 L75,28 L87,45 L75,62 L87,79 L75,96 L57,96 L45,79 L57,62 L45,45Z" fill="none" stroke="%23006666" stroke-width="2.5" opacity="0.6"/><circle cx="60" cy="52" r="5" fill="%23c49a6c" opacity="0.5"/></svg>') no-repeat;
            background-size: contain;
        }
        
        .corner-tr {
            top: -5px;
            right: -5px;
            transform: rotate(90deg);
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120"><path d="M30,30 L45,10 L70,10 L85,30 L70,50 L85,70 L70,90 L45,90 L30,70 L45,50 L30,30Z" fill="none" stroke="%238b5a2b" stroke-width="3" opacity="0.7"/><path d="M45,45 L57,28 L75,28 L87,45 L75,62 L87,79 L75,96 L57,96 L45,79 L57,62 L45,45Z" fill="none" stroke="%23006666" stroke-width="2.5" opacity="0.6"/><circle cx="60" cy="52" r="5" fill="%23c49a6c" opacity="0.5"/></svg>') no-repeat;
            background-size: contain;
        }
        
        .corner-bl {
            bottom: -5px;
            left: -5px;
            transform: rotate(-90deg);
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120"><path d="M30,30 L45,10 L70,10 L85,30 L70,50 L85,70 L70,90 L45,90 L30,70 L45,50 L30,30Z" fill="none" stroke="%238b5a2b" stroke-width="3" opacity="0.7"/><path d="M45,45 L57,28 L75,28 L87,45 L75,62 L87,79 L75,96 L57,96 L45,79 L57,62 L45,45Z" fill="none" stroke="%23006666" stroke-width="2.5" opacity="0.6"/><circle cx="60" cy="52" r="5" fill="%23c49a6c" opacity="0.5"/></svg>') no-repeat;
            background-size: contain;
        }
        
        .corner-br {
            bottom: -5px;
            right: -5px;
            transform: rotate(180deg);
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120"><path d="M30,30 L45,10 L70,10 L85,30 L70,50 L85,70 L70,90 L45,90 L30,70 L45,50 L30,30Z" fill="none" stroke="%238b5a2b" stroke-width="3" opacity="0.7"/><path d="M45,45 L57,28 L75,28 L87,45 L75,62 L87,79 L75,96 L57,96 L45,79 L57,62 L45,45Z" fill="none" stroke="%23006666" stroke-width="2.5" opacity="0.6"/><circle cx="60" cy="52" r="5" fill="%23c49a6c" opacity="0.5"/></svg>') no-repeat;
            background-size: contain;
        }
        
        /* Шаңырақ - центральный символ */
        .shanyrak {
            width: 110px;
            height: 110px;
            margin: 0 auto 25px;
            position: relative;
            z-index: 15;
            filter: drop-shadow(0 10px 15px rgba(0, 80, 100, 0.4));
        }
        
        .shanyrak-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90px;
            height: 90px;
            border: 5px solid #b8860b;
            border-radius: 50%;
            box-shadow: inset 0 0 15px #b69b7c;
        }
        
        .shanyrak-circle::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            background: #006666;
            border-radius: 50%;
            border: 3px solid #b8860b;
        }
        
        .shanyrak-spoke {
            position: absolute;
            top: 0;
            left: 50%;
            width: 3px;
            height: 100%;
            background: linear-gradient(to bottom, #b8860b, #006666, #b8860b);
            transform-origin: center;
        }
        
        .shanyrak-spoke:nth-child(2) { transform: rotate(45deg); }
        .shanyrak-spoke:nth-child(3) { transform: rotate(90deg); }
        .shanyrak-spoke:nth-child(4) { transform: rotate(135deg); }
        
        .content {
            position: relative;
            z-index: 20;
            text-align: center;
        }
        
        .event-type {
            font-size: 20px;
            letter-spacing: 8px;
            color: #8b5a2b;
            margin-bottom: 10px;
            text-transform: uppercase;
            font-weight: 400;
        }
        
        .couple {
            font-size: 62px;
            font-weight: 600;
            color: #1e3b44;
            margin-bottom: 10px;
            line-height: 1.2;
            text-shadow: 2px 2px 0 #b69b7c;
        }
        
        .couple span {
            display: inline-block;
            font-size: 44px;
            color: #b8860b;
            margin: 0 12px;
        }
        
        .blessing {
            font-size: 28px;
            color: #006666;
            font-style: italic;
            margin-bottom: 25px;
            padding: 10px 0;
            border-top: 2px solid #b8860b;
            border-bottom: 2px solid #b8860b;
            display: inline-block;
            font-family: 'Georgia', serif;
        }
        
        .date-box {
            background: rgba(182, 155, 124, 0.15);
            border: 3px double #8b5a2b;
            border-radius: 200px;
            padding: 20px 35px;
            margin: 30px 0;
            box-shadow: inset 0 0 30px rgba(184, 134, 11, 0.2);
        }
        
        .date {
            font-size: 48px;
            font-weight: 600;
            color: #1e3b44;
            line-height: 1.2;
        }
        
        .date small {
            font-size: 22px;
            color: #006666;
            display: block;
            letter-spacing: 4px;
        }
        
        .venue {
            font-size: 36px;
            color: #8b5a2b;
            margin: 15px 0 5px;
            font-weight: 500;
        }
        
        .address {
            font-size: 20px;
            color: #1e3b44;
            margin-bottom: 20px;
            font-style: italic;
            background: rgba(0, 102, 102, 0.1);
            padding: 8px 25px;
            display: inline-block;
            border-radius: 50px;
        }
        
        .time {
            font-size: 22px;
            color: #006666;
            margin: 20px 0;
            padding: 12px 30px;
            background: rgba(184, 134, 11, 0.1);
            display: inline-block;
            border-radius: 50px;
            font-weight: 500;
        }
        
        .rsvp {
            margin: 40px 0 30px;
            padding: 25px;
            background: linear-gradient(145deg, #1e3b44, #0e2a33);
            border-radius: 100px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }
        
        .rsvp-label {
            font-size: 16px;
            letter-spacing: 5px;
            color: #b8860b;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        
        .contact-button {
            display: inline-block;
            background: #b8860b;
            color: #1e3b44;
            padding: 18px 50px;
            border-radius: 60px;
            text-decoration: none;
            font-size: 20px;
            font-weight: 600;
            border: 3px solid #b69b7c;
            transition: all 0.4s ease;
            box-shadow: 0 5px 15px rgba(184, 134, 11, 0.4);
        }
        
        .contact-button:hover {
            background: #e5b73b;
            transform: translateY(-3px);
            box-shadow: 0 15px 30px #b8860b;
        }
        
        .organizer {
            margin-top: 25px;
            font-size: 20px;
            color: #1e3b44;
        }
        
        .organizer a {
            color: #006666;
            text-decoration: none;
            border-bottom: 2px dotted #b8860b;
            font-weight: 600;
            padding-bottom: 2px;
        }
        
        .organizer a:hover {
            color: #b8860b;
        }
        
        .footer {
            margin-top: 35px;
            padding-top: 20px;
            border-top: 3px solid #8b5a2b;
            font-size: 16px;
            color: #b69b7c;
            display: flex;
            justify-content: center;
            gap: 35px;
            letter-spacing: 2px;
        }
        
        .footer span {
            color: #006666;
            font-weight: 600;
        }
        
        @media (max-width: 550px) {
            .card { padding: 40px 25px; }
            .couple { font-size: 44px; }
            .couple span { font-size: 32px; }
            .date { font-size: 36px; }
            .date small { font-size: 18px; }
            .venue { font-size: 28px; }
            .blessing { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- Орнаменты -->
        <div class="ornament-top"></div>
        <div class="ornament-bottom"></div>
        
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>
        
        <div class="content">
            <!-- Шаңырақ -->
            <div class="shanyrak">
                <div class="shanyrak-circle"></div>
                <div class="shanyrak-spoke"></div>
                <div class="shanyrak-spoke"></div>
                <div class="shanyrak-spoke"></div>
                <div class="shanyrak-spoke"></div>
            </div>
            
            <div class="event-type">ҚАЗАҚ ТОЙ</div>
            
            <h1 class="couple">
                АЛМАС <span>&</span> ЖАНАР
            </h1>
            
            <div class="blessing">Шаңырағыңыз биік болсын</div>
            
            <div class="date-box">
                <div class="date">
                    15 АВГУСТА 2026
                    <small>СЕНБІ • 18:00</small>
                </div>
            </div>
            
            <div class="venue">«АЛТЫН ҰЯ»</div>
            <div class="address">Алматинская область, Карасайский район</div>
            
            <div class="time">
                Қонақтарды жинау • 17:00
            </div>
            
            <div class="rsvp">
                <div class="rsvp-label">РАСТАУ</div>
                <a href="https://wa.me/77771234567?text=Құрметті%20АЛМАС%20және%20ЖАНАР!%20Мен%20тойға%20қатысамын" target="_blank" class="contact-button">
                    WhatsApp
                </a>
            </div>
            
            <div class="organizer">
                Ұйымдастырушы: <a href="tel:+77771234567">Айгүл, +7 (777) 123-45-67</a>
            </div>
            
            <div class="footer">
                <span>АЛМАТЫ</span> • 2026 • <span>БЕРЕКЕ</span>
            </div>
        </div>
    </div>
</body>
</html>
