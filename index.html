<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Салт-дәстүр | Базовое приглашение</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #2b1b0e 0%, #4a3724 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'Cormorant Garamond', 'Times New Roman', serif;
            position: relative;
        }
        
        /* Текстура старой бумаги */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="1" stitchTiles="stitch"/></filter><rect width="200" height="200" filter="url(%23noise)" opacity="0.1"/></svg>');
            opacity: 0.2;
            pointer-events: none;
        }
        
        .card {
            max-width: 680px;
            width: 100%;
            background: #fcf3e1;
            border-radius: 60px 60px 60px 60px;
            padding: 60px 50px;
            box-shadow: 
                0 40px 70px -10px rgba(0,0,0,0.8),
                0 0 0 3px #a67b5b,
                0 0 0 8px #d8b48c,
                inset 0 0 30px rgba(210, 180, 140, 0.5);
            position: relative;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(166, 123, 91, 0.1) 0%, transparent 25%),
                radial-gradient(circle at 80% 70%, rgba(139, 69, 19, 0.1) 0%, transparent 30%);
        }
        
        /* Орнамент "Кошкар муйиз" по краю */
        .card::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 30px;
            right: 30px;
            height: 40px;
            background: repeating-linear-gradient(90deg,
                transparent 0px,
                transparent 40px,
                #8b4513 40px,
                #8b4513 42px,
                transparent 42px,
                transparent 82px,
                #a67b5b 82px,
                #a67b5b 84px,
                transparent 84px,
                transparent 124px,
                #cd853f 124px,
                #cd853f 126px,
                transparent 126px,
                transparent 166px
            );
            opacity: 0.4;
            border-bottom: 2px dashed #b22222;
        }
        
        .card::after {
            content: '';
            position: absolute;
            bottom: 20px;
            left: 30px;
            right: 30px;
            height: 40px;
            background: repeating-linear-gradient(90deg,
                transparent 0px,
                transparent 40px,
                #cd853f 40px,
                #cd853f 42px,
                transparent 42px,
                transparent 82px,
                #8b4513 82px,
                #8b4513 84px,
                transparent 84px,
                transparent 124px,
                #a67b5b 124px,
                #a67b5b 126px,
                transparent 126px,
                transparent 166px
            );
            opacity: 0.4;
            border-top: 2px dashed #b8860b;
        }
        
        /* Угловые орнаменты (тумары) */
        .tumar {
            position: absolute;
            width: 80px;
            height: 80px;
            filter: drop-shadow(0 5px 10px rgba(139, 69, 19, 0.3));
        }
        
        .tumar-tl {
            top: 10px;
            left: 10px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M50,5 L75,20 L75,45 L50,60 L25,45 L25,20 Z" fill="none" stroke="%238b4513" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><circle cx="50" cy="32" r="5" fill="%23b8860b" opacity="0.5"/></svg>') no-repeat;
            background-size: contain;
        }
        
        .tumar-tr {
            top: 10px;
            right: 10px;
            transform: rotate(90deg);
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M50,5 L75,20 L75,45 L50,60 L25,45 L25,20 Z" fill="none" stroke="%238b4513" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><circle cx="50" cy="32" r="5" fill="%23b8860b" opacity="0.5"/></svg>') no-repeat;
            background-size: contain;
        }
        
        .tumar-bl {
            bottom: 10px;
            left: 10px;
            transform: rotate(-90deg);
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M50,5 L75,20 L75,45 L50,60 L25,45 L25,20 Z" fill="none" stroke="%238b4513" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><circle cx="50" cy="32" r="5" fill="%23b8860b" opacity="0.5"/></svg>') no-repeat;
            background-size: contain;
        }
        
        .tumar-br {
            bottom: 10px;
            right: 10px;
            transform: rotate(180deg);
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M50,5 L75,20 L75,45 L50,60 L25,45 L25,20 Z" fill="none" stroke="%238b4513" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><circle cx="50" cy="32" r="5" fill="%23b8860b" opacity="0.5"/></svg>') no-repeat;
            background-size: contain;
        }
        
        /* Кисточки (шашак) */
        .tassel {
            position: absolute;
            width: 25px;
            height: 45px;
            background: #8b4513;
            border-radius: 15px 15px 0 0;
            z-index: 10;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.2));
        }
        
        .tassel::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 0;
            width: 25px;
            height: 20px;
            background: repeating-linear-gradient(45deg, #b8860b, #b8860b 5px, #cd853f 5px, #cd853f 10px);
            border-radius: 0 0 10px 10px;
        }
        
        .tassel-left {
            top: 30px;
            left: -5px;
        }
        
        .tassel-right {
            top: 30px;
            right: -5px;
        }
        
        .content {
            position: relative;
            z-index: 20;
            text-align: center;
        }
        
        .event-type {
            font-size: 20px;
            letter-spacing: 8px;
            color: #8b4513;
            margin-bottom: 15px;
            text-transform: uppercase;
            font-weight: 400;
            opacity: 0.8;
        }
        
        .couple {
            font-size: 60px;
            font-weight: 600;
            color: #2b1b0e;
            margin-bottom: 10px;
            line-height: 1.2;
            text-shadow: 3px 3px 0 #d8b48c;
        }
        
        .couple span {
            display: inline-block;
            font-size: 42px;
            color: #8b4513;
            margin: 0 15px;
            font-weight: 400;
        }
        
        .blessing {
            font-size: 26px;
            color: #a67b5b;
            font-style: italic;
            margin-bottom: 25px;
            font-family: 'Georgia', serif;
            border-bottom: 2px dotted #b8860b;
            border-top: 2px dotted #b8860b;
            padding: 12px 0;
            display: inline-block;
        }
        
        .date-box {
            background: #f0e0c4;
            border: 3px double #8b4513;
            border-radius: 200px;
            padding: 20px 30px;
            margin: 30px 0;
            box-shadow: inset 0 0 30px #b8860b;
        }
        
        .date {
            font-size: 44px;
            font-weight: 600;
            color: #2b1b0e;
            line-height: 1.2;
        }
        
        .date small {
            font-size: 22px;
            color: #8b4513;
            display: block;
            letter-spacing: 3px;
        }
        
        .venue {
            font-size: 34px;
            color: #4a3724;
            margin: 15px 0 5px;
            font-weight: 500;
            letter-spacing: 2px;
        }
        
        .address {
            font-size: 20px;
            color: #a67b5b;
            margin-bottom: 15px;
            font-style: italic;
            background: rgba(139, 69, 19, 0.1);
            padding: 5px 20px;
            display: inline-block;
            border-radius: 40px;
        }
        
        .time {
            font-size: 22px;
            color: #8b4513;
            margin: 20px 0;
            padding: 10px 25px;
            background: rgba(210, 180, 140, 0.3);
            display: inline-block;
            border-radius: 50px;
        }
        
        .rsvp {
            margin: 35px 0 25px;
            padding: 25px;
            background: #d8b48c;
            border-radius: 100px 100px 100px 100px;
            border: 3px solid #4a3724;
        }
        
        .rsvp-label {
            font-size: 16px;
            letter-spacing: 4px;
            color: #4a3724;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        
        .contact-button {
            display: inline-block;
            background: #4a3724;
            color: #fcf3e1;
            padding: 18px 45px;
            border-radius: 60px;
            text-decoration: none;
            font-size: 20px;
            font-weight: 500;
            border: 2px solid #b8860b;
            transition: all 0.4s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .contact-button:hover {
            background: #2b1b0e;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px #b8860b;
        }
        
        .organizer {
            margin-top: 25px;
            font-size: 20px;
            color: #4a3724;
        }
        
        .organizer a {
            color: #8b4513;
            text-decoration: none;
            border-bottom: 2px dotted #b8860b;
            font-weight: 600;
        }
        
        .footer {
            margin-top: 35px;
            padding-top: 20px;
            border-top: 3px solid #8b4513;
            font-size: 16px;
            color: #a67b5b;
            display: flex;
            justify-content: center;
            gap: 30px;
            letter-spacing: 2px;
        }
        
        .footer span {
            color: #8b4513;
        }
        
        @media (max-width: 500px) {
            .card { padding: 40px 25px; }
            .couple { font-size: 42px; }
            .couple span { font-size: 32px; }
            .date { font-size: 32px; }
            .venue { font-size: 26px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="tumar tumar-tl"></div>
        <div class="tumar tumar-tr"></div>
        <div class="tumar tumar-bl"></div>
        <div class="tumar tumar-br"></div>
        
        <div class="tassel tassel-left"></div>
        <div class="tassel tassel-right"></div>
        
        <div class="content">
            <div class="event-type">ҚАЗАҚ ТОЙЫ</div>
            
            <h1 class="couple">
                АСХАТ <span>&</span> АЙНА
            </h1>
            
            <div class="blessing">Берекелі шаңырақ астында</div>
            
            <div class="date-box">
                <div class="date">
                    15 АВГУСТА 2026
                    <small>Суббота • 18:00</small>
                </div>
            </div>
            
            <div class="venue">«АЛТЫН БЕСІК»</div>
            <div class="address">Алматинская область, Карасайский район</div>
            
            <div class="time">
                Сбор гостей • 17:00
            </div>
            
            <div class="rsvp">
                <div class="rsvp-label">ПОДТВЕРЖДЕНИЕ</div>
                <a href="https://wa.me/77771234567" target="_blank" class="contact-button">
                    СВЯЗАТЬСЯ
                </a>
            </div>
            
            <div class="organizer">
                Организатор: <a href="tel:+77771234567">Айгуль, +7 (777) 123-45-67</a>
            </div>
            
            <div class="footer">
                <span>АЛМАТЫ</span> • 2026
            </div>
        </div>
    </div>
</body>
</html>
