<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Қазақ стилі | Базовое приглашение</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0e3b45 0%, #1e5568 50%, #124a5a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'Cormorant Garamond', 'Times New Roman', serif;
            position: relative;
        }
        
        /* Мягкое свечение */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 30% 40%, rgba(212, 175, 55, 0.12) 0%, transparent 45%),
                        radial-gradient(circle at 70% 60%, rgba(100, 180, 200, 0.12) 0%, transparent 45%);
            pointer-events: none;
        }
        
        .card {
            max-width: 680px;
            width: 100%;
            background: #fcf8f0;
            border-radius: 70px 70px 70px 70px;
            padding: 60px 50px;
            box-shadow: 
                0 40px 70px -15px rgba(0, 0, 0, 0.7),
                0 0 0 4px #a67c52,
                0 0 0 10px #e8d9c4;
            position: relative;
            overflow: hidden;
        }
        
        /* ===== ЛИНИИ В КАЗАХСКОМ СТИЛЕ ===== */
        
        /* Верхняя группа линий */
        .lines-top {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 30px;
            background: linear-gradient(
                90deg,
                #b8860b 0%, #b8860b 5px,
                transparent 5px, transparent 15px,
                #006688 15px, #006688 20px,
                transparent 20px, transparent 30px,
                #8b5a2b 30px, #8b5a2b 35px,
                transparent 35px, transparent 45px,
                #b8860b 45px, #b8860b 50px,
                transparent 50px, transparent 60px,
                #006688 60px, #006688 65px,
                transparent 65px, transparent 75px
            );
            background-size: 75px 30px;
            opacity: 0.5;
        }
        
        /* Нижняя группа линий */
        .lines-bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 30px;
            background: linear-gradient(
                90deg,
                #006688 0%, #006688 5px,
                transparent 5px, transparent 15px,
                #8b5a2b 15px, #8b5a2b 20px,
                transparent 20px, transparent 30px,
                #b8860b 30px, #b8860b 35px,
                transparent 35px, transparent 45px,
                #006688 45px, #006688 50px,
                transparent 50px, transparent 60px,
                #8b5a2b 60px, #8b5a2b 65px,
                transparent 65px, transparent 75px
            );
            background-size: 75px 30px;
            opacity: 0.5;
        }
        
        /* Левая группа линий */
        .lines-left {
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            width: 25px;
            background: linear-gradient(
                180deg,
                #b8860b 0%, #b8860b 5px,
                transparent 5px, transparent 15px,
                #006688 15px, #006688 20px,
                transparent 20px, transparent 30px,
                #8b5a2b 30px, #8b5a2b 35px,
                transparent 35px, transparent 45px,
                #b8860b 45px, #b8860b 50px,
                transparent 50px, transparent 60px,
                #006688 60px, #006688 65px,
                transparent 65px, transparent 75px
            );
            background-size: 25px 75px;
            opacity: 0.5;
        }
        
        /* Правая группа линий */
        .lines-right {
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            width: 25px;
            background: linear-gradient(
                180deg,
                #006688 0%, #006688 5px,
                transparent 5px, transparent 15px,
                #8b5a2b 15px, #8b5a2b 20px,
                transparent 20px, transparent 30px,
                #b8860b 30px, #b8860b 35px,
                transparent 35px, transparent 45px,
                #006688 45px, #006688 50px,
                transparent 50px, transparent 60px,
                #8b5a2b 60px, #8b5a2b 65px,
                transparent 65px, transparent 75px
            );
            background-size: 25px 75px;
            opacity: 0.5;
        }
        
        /* Угловые акценты */
        .corner {
            position: absolute;
            width: 40px;
            height: 40px;
            z-index: 10;
        }
        
        .corner-tl {
            top: 10px;
            left: 10px;
            border-top: 4px solid #b8860b;
            border-left: 4px solid #b8860b;
        }
        
        .corner-tr {
            top: 10px;
            right: 10px;
            border-top: 4px solid #006688;
            border-right: 4px solid #006688;
        }
        
        .corner-bl {
            bottom: 10px;
            left: 10px;
            border-bottom: 4px solid #006688;
            border-left: 4px solid #006688;
        }
        
        .corner-br {
            bottom: 10px;
            right: 10px;
            border-bottom: 4px solid #b8860b;
            border-right: 4px solid #b8860b;
        }
        
        /* Шаңырақ (минималистичный) */
        .shanyrak {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            position: relative;
            border: 4px solid #b8860b;
            border-radius: 50%;
            box-shadow: 0 0 0 3px #006688;
        }
        
        .shanyrak::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 25px;
            height: 25px;
            background: #006688;
            border-radius: 50%;
            border: 2px solid #b8860b;
        }
        
        .shanyrak .line {
            position: absolute;
            top: 0;
            left: 50%;
            width: 2px;
            height: 100%;
            background: #b8860b;
            transform-origin: center;
        }
        
        .shanyrak .line:nth-child(1) { transform: rotate(0deg); }
        .shanyrak .line:nth-child(2) { transform: rotate(45deg); }
        .shanyrak .line:nth-child(3) { transform: rotate(90deg); }
        .shanyrak .line:nth-child(4) { transform: rotate(135deg); }
        
        .content {
            position: relative;
            z-index: 20;
            text-align: center;
        }
        
        .event-type {
            font-size: 20px;
            letter-spacing: 8px;
            color: #8b5a2b;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        
        .couple {
            font-size: 64px;
            font-weight: 600;
            color: #0e3b45;
            margin-bottom: 10px;
            line-height: 1.2;
            text-shadow: 2px 2px 0 #e8d9c4;
        }
        
        .couple span {
            display: inline-block;
            font-size: 46px;
            color: #b8860b;
            margin: 0 15px;
        }
        
        .blessing {
            font-size: 26px;
            color: #006688;
            font-style: italic;
            margin-bottom: 25px;
            padding: 10px 0;
            border-top: 2px solid #b8860b;
            border-bottom: 2px solid #b8860b;
            display: inline-block;
        }
        
        .date-box {
            border: 3px double #8b5a2b;
            border-radius: 200px;
            padding: 20px 35px;
            margin: 30px 0;
            background: rgba(166, 124, 82, 0.05);
        }
        
        .date {
            font-size: 48px;
            font-weight: 600;
            color: #0e3b45;
            line-height: 1.2;
        }
        
        .date small {
            font-size: 22px;
            color: #006688;
            display: block;
            letter-spacing: 4px;
        }
        
        .venue {
            font-size: 36px;
            color: #8b5a2b;
            margin: 15px 0 5px;
            font-weight: 500;
        }
        
        .address {
            font-size: 20px;
            color: #0e3b45;
            margin-bottom: 20px;
            font-style: italic;
            background: rgba(0, 102, 136, 0.08);
            padding: 8px 25px;
            display: inline-block;
            border-radius: 50px;
        }
        
        .time {
            font-size: 22px;
            color: #006688;
            margin: 20px 0;
            padding: 12px 30px;
            background: rgba(184, 134, 11, 0.1);
            display: inline-block;
            border-radius: 50px;
        }
        
        .rsvp {
            margin: 40px 0 30px;
            padding: 25px;
            background: #0e3b45;
            border-radius: 100px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }
        
        .rsvp-label {
            font-size: 16px;
            letter-spacing: 5px;
            color: #b8860b;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        
        .contact-button {
            display: inline-block;
            background: #b8860b;
            color: #0e3b45;
            padding: 18px 50px;
            border-radius: 60px;
            text-decoration: none;
            font-size: 20px;
            font-weight: 600;
            border: 3px solid #e8d9c4;
            transition: all 0.4s ease;
        }
        
        .contact-button:hover {
            background: #e5b73b;
            transform: translateY(-3px);
            box-shadow: 0 15px 30px #b8860b;
        }
        
        .organizer {
            margin-top: 25px;
            font-size: 20px;
            color: #0e3b45;
        }
        
        .organizer a {
            color: #006688;
            text-decoration: none;
            border-bottom: 2px dotted #b8860b;
        }
        
        .footer {
            margin-top: 35px;
            padding-top: 20px;
            border-top: 3px solid #8b5a2b;
            font-size: 16px;
            color: #a67c52;
            display: flex;
            justify-content: center;
            gap: 35px;
            letter-spacing: 2px;
        }
        
        .footer span {
            color: #006688;
            font-weight: 600;
        }
        
        @media (max-width: 550px) {
            .card { padding: 40px 25px; }
            .couple { font-size: 44px; }
            .couple span { font-size: 32px; }
            .date { font-size: 36px; }
            .date small { font-size: 18px; }
            .venue { font-size: 28px; }
            .blessing { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- Линии по краям -->
        <div class="lines-top"></div>
        <div class="lines-bottom"></div>
        <div class="lines-left"></div>
        <div class="lines-right"></div>
        
        <!-- Угловые акценты -->
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>
        
        <div class="content">
            <!-- Шаңырақ -->
            <div class="shanyrak">
                <div class="line"></div>
                <div class="line"></div>
                <div class="line"></div>
                <div class="line"></div>
            </div>
            
            <div class="event-type">ҚАЗАҚ ТОЙЫ</div>
            
            <h1 class="couple">
                АЛМАС <span>&</span> ЖАНАР
            </h1>
            
            <div class="blessing">Шаңырағыңыз биік болсын</div>
            
            <div class="date-box">
                <div class="date">
                    15 АВГУСТА 2026
                    <small>суббота • 18:00</small>
                </div>
            </div>
            
            <div class="venue">«АЛТЫН ҰЯ»</div>
            <div class="address">Алматинская область, Карасайский район</div>
            
            <div class="time">
                Сбор гостей • 17:00
            </div>
            
            <div class="rsvp">
                <div class="rsvp-label">ПОДТВЕРДИТЕ УЧАСТИЕ</div>
                <a href="https://wa.me/77771234567?text=Здравствуйте!%20Подтверждаю%20участие%20на%20свадьбе%20АЛМАС%20и%20ЖАНАР%2015%20августа" target="_blank" class="contact-button">
                    WhatsApp
                </a>
            </div>
            
            <div class="organizer">
                Организатор: <a href="tel:+77771234567">Айгүл, +7 (777) 123-45-67</a>
            </div>
            
            <div class="footer">
                <span>АЛМАТЫ</span> • 2026 • <span>БЕРЕКЕ</span>
            </div>
        </div>
    </div>
</body>
</html>
