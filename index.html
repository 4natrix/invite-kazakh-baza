<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Қазақ стилі | Свадебное приглашение</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0a3a44 0%, #1b5a6b 50%, #0e4755 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'Cormorant Garamond', 'Times New Roman', serif;
            position: relative;
        }
        
        /* Звездное небо (традиционный символ) */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(2px 2px at 15px 30px, rgba(255, 215, 0, 0.6), rgba(0,0,0,0)),
                radial-gradient(3px 3px at 45px 80px, rgba(255, 255, 200, 0.7), rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 150px, #fff, rgba(0,0,0,0)),
                radial-gradient(4px 4px at 200px 50px, #ffd700, rgba(0,0,0,0)),
                radial-gradient(3px 3px at 280px 200px, #87ceeb, rgba(0,0,0,0));
            background-size: 400px 400px;
            opacity: 0.5;
            pointer-events: none;
        }
        
        .card {
            max-width: 700px;
            width: 100%;
            background: #fcf8f0;
            border-radius: 90px 90px 90px 90px;
            padding: 60px 50px;
            box-shadow: 
                0 50px 80px -15px rgba(0, 0, 0, 0.8),
                0 0 0 4px #a67c52,
                0 0 0 12px #e8d9c4,
                inset 0 0 50px rgba(166, 124, 82, 0.2);
            position: relative;
            border: 2px solid #b8860b;
        }
        
        /* ===== КАЗАХСКИЕ ОРНАМЕНТЫ ===== */
        
        /* Верхний бордюр - баскур (традиционная узорная лента) [citation:1] */
        .ornament-top {
            position: absolute;
            top: 15px;
            left: 40px;
            right: 40px;
            height: 50px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 50" preserveAspectRatio="xMidYMid slice"><path d="M40,25 L60,8 L80,25 L100,8 L120,25 L140,8 L160,25 L180,8 L200,25 L220,8 L240,25 L260,8" stroke="%238b5a2b" fill="none" stroke-width="3" opacity="0.8"/><path d="M50,35 L70,20 L90,35 L110,20 L130,35 L150,20 L170,35 L190,20 L210,35 L230,20 L250,35" stroke="%23006688" fill="none" stroke-width="2.5" opacity="0.7"/><circle cx="70" cy="18" r="4" fill="%23b8860b" opacity="0.6"/><circle cx="150" cy="18" r="4" fill="%23b8860b" opacity="0.6"/><circle cx="230" cy="18" r="4" fill="%23b8860b" opacity="0.6"/></svg>') repeat-x;
            background-size: 300px 50px;
            z-index: 5;
        }
        
        /* Нижний бордюр */
        .ornament-bottom {
            position: absolute;
            bottom: 15px;
            left: 40px;
            right: 40px;
            height: 50px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 50" preserveAspectRatio="xMidYMid slice"><path d="M40,25 L60,42 L80,25 L100,42 L120,25 L140,42 L160,25 L180,42 L200,25 L220,42 L240,25 L260,42" stroke="%23006688" fill="none" stroke-width="3" opacity="0.8"/><path d="M50,15 L70,30 L90,15 L110,30 L130,15 L150,30 L170,15 L190,30 L210,15 L230,30 L250,15" stroke="%238b5a2b" fill="none" stroke-width="2.5" opacity="0.7"/><circle cx="100" cy="32" r="4" fill="%23b8860b" opacity="0.6"/><circle cx="200" cy="32" r="4" fill="%23b8860b" opacity="0.6"/></svg>') repeat-x;
            background-size: 300px 50px;
            z-index: 5;
        }
        
        /* Угловые орнаменты - ҚОШҚАР МҮЙІЗ (бараний рог) - самый распространенный казахский орнамент [citation:2] */
        .corner {
            position: absolute;
            width: 140px;
            height: 140px;
            z-index: 10;
            filter: drop-shadow(0 5px 10px rgba(139, 69, 19, 0.3));
        }
        
        .corner-tl {
            top: -5px;
            left: -5px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140"><path d="M40,40 L58,15 L85,15 L103,40 L85,65 L103,90 L85,115 L58,115 L40,90 L58,65 L40,40Z" fill="none" stroke="%238b5a2b" stroke-width="3.5" opacity="0.9"/><path d="M55,55 L71,35 L92,35 L108,55 L92,75 L108,95 L92,115 L71,115 L55,95 L71,75 L55,55Z" fill="none" stroke="%23006688" stroke-width="3" opacity="0.8"/><circle cx="73" cy="65" r="7" fill="%23b8860b" opacity="0.6"/></svg>') no-repeat;
            background-size: contain;
        }
        
        .corner-tr {
            top: -5px;
            right: -5px;
            transform: rotate(90deg);
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140"><path d="M40,40 L58,15 L85,15 L103,40 L85,65 L103,90 L85,115 L58,115 L40,90 L58,65 L40,40Z" fill="none" stroke="%238b5a2b" stroke-width="3.5" opacity="0.9"/><path d="M55,55 L71,35 L92,35 L108,55 L92,75 L108,95 L92,115 L71,115 L55,95 L71,75 L55,55Z" fill="none" stroke="%23006688" stroke-width="3" opacity="0.8"/><circle cx="73" cy="65" r="7" fill="%23b8860b" opacity="0.6"/></svg>') no-repeat;
            background-size: contain;
        }
        
        .corner-bl {
            bottom: -5px;
            left: -5px;
            transform: rotate(-90deg);
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140"><path d="M40,40 L58,15 L85,15 L103,40 L85,65 L103,90 L85,115 L58,115 L40,90 L58,65 L40,40Z" fill="none" stroke="%238b5a2b" stroke-width="3.5" opacity="0.9"/><path d="M55,55 L71,35 L92,35 L108,55 L92,75 L108,95 L92,115 L71,115 L55,95 L71,75 L55,55Z" fill="none" stroke="%23006688" stroke-width="3" opacity="0.8"/><circle cx="73" cy="65" r="7" fill="%23b8860b" opacity="0.6"/></svg>') no-repeat;
            background-size: contain;
        }
        
        .corner-br {
            bottom: -5px;
            right: -5px;
            transform: rotate(180deg);
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140"><path d="M40,40 L58,15 L85,15 L103,40 L85,65 L103,90 L85,115 L58,115 L40,90 L58,65 L40,40Z" fill="none" stroke="%238b5a2b" stroke-width="3.5" opacity="0.9"/><path d="M55,55 L71,35 L92,35 L108,55 L92,75 L108,95 L92,115 L71,115 L55,95 L71,75 L55,55Z" fill="none" stroke="%23006688" stroke-width="3" opacity="0.8"/><circle cx="73" cy="65" r="7" fill="%23b8860b" opacity="0.6"/></svg>') no-repeat;
            background-size: contain;
        }
        
        /* Боковые орнаменты - ТҰМАР (оберег) */
        .tumar {
            position: absolute;
            width: 60px;
            height: 120px;
            z-index: 6;
            opacity: 0.5;
        }
        
        .tumar-left {
            left: 5px;
            top: 50%;
            transform: translateY(-50%);
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 120"><path d="M30,15 L47,25 L47,45 L30,60 L13,45 L13,25 Z" fill="none" stroke="%238b5a2b" stroke-width="2.5"/><circle cx="30" cy="32" r="5" fill="%23b8860b" opacity="0.5"/><path d="M30,50 L45,62 L45,82 L30,95 L15,82 L15,62 Z" fill="none" stroke="%23006688" stroke-width="2.5"/><circle cx="30" cy="68" r="5" fill="%23b8860b" opacity="0.5"/><path d="M30,85 L42,95 L42,110 L30,120 L18,110 L18,95 Z" fill="none" stroke="%238b5a2b" stroke-width="2"/><circle cx="30" cy="98" r="4" fill="%23b8860b" opacity="0.5"/></svg>') repeat-y;
            background-size: 60px 120px;
        }
        
        .tumar-right {
            right: 5px;
            top: 50%;
            transform: translateY(-50%) rotate(180deg);
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 120"><path d="M30,15 L47,25 L47,45 L30,60 L13,45 L13,25 Z" fill="none" stroke="%238b5a2b" stroke-width="2.5"/><circle cx="30" cy="32" r="5" fill="%23b8860b" opacity="0.5"/><path d="M30,50 L45,62 L45,82 L30,95 L15,82 L15,62 Z" fill="none" stroke="%23006688" stroke-width="2.5"/><circle cx="30" cy="68" r="5" fill="%23b8860b" opacity="0.5"/><path d="M30,85 L42,95 L42,110 L30,120 L18,110 L18,95 Z" fill="none" stroke="%238b5a2b" stroke-width="2"/><circle cx="30" cy="98" r="4" fill="%23b8860b" opacity="0.5"/></svg>') repeat-y;
            background-size: 60px 120px;
        }
        
        /* Шаңырақ (верхний купол юрты) */
        .shanyrak {
            width: 130px;
            height: 130px;
            margin: 0 auto 20px;
            position: relative;
            z-index: 15;
            filter: drop-shadow(0 15px 20px rgba(0, 80, 100, 0.5));
        }
        
        .shanyrak-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 110px;
            height: 110px;
            border: 6px solid #b8860b;
            border-radius: 50%;
            box-shadow: inset 0 0 20px #a67c52;
        }
        
        .shanyrak-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 35px;
            height: 35px;
            background: #006688;
            border-radius: 50%;
            border: 4px solid #b8860b;
            box-shadow: 0 0 20px #b8860b;
        }
        
        .shanyrak-spoke {
            position: absolute;
            top: 0;
            left: 50%;
            width: 5px;
            height: 100%;
            background: linear-gradient(to bottom, #b8860b, #006688, #b8860b);
            transform-origin: center;
            border-radius: 3px;
        }
        
        .shanyrak-spoke:nth-child(2) { transform: rotate(45deg); }
        .shanyrak-spoke:nth-child(3) { transform: rotate(90deg); }
        .shanyrak-spoke:nth-child(4) { transform: rotate(135deg); }
        
        /* Контент */
        .content {
            position: relative;
            z-index: 20;
            text-align: center;
        }
        
        .event-type {
            font-size: 22px;
            letter-spacing: 8px;
            color: #8b5a2b;
            margin-bottom: 10px;
            text-transform: uppercase;
            font-weight: 500;
        }
        
        .couple {
            font-size: 68px;
            font-weight: 600;
            color: #0a3a44;
            margin-bottom: 10px;
            line-height: 1.2;
            text-shadow: 2px 2px 0 #e8d9c4;
        }
        
        .couple span {
            display: inline-block;
            font-size: 48px;
            color: #b8860b;
            margin: 0 15px;
        }
        
        .blessing {
            font-size: 28px;
            color: #006688;
            font-style: italic;
            margin-bottom: 25px;
            padding: 12px 0;
            border-top: 2px solid #b8860b;
            border-bottom: 2px solid #b8860b;
            display: inline-block;
        }
        
        .date-box {
            background: rgba(166, 124, 82, 0.12);
            border: 3px double #8b5a2b;
            border-radius: 200px;
            padding: 22px 40px;
            margin: 30px 0;
            box-shadow: inset 0 0 30px rgba(184, 134, 11, 0.2);
        }
        
        .date {
            font-size: 52px;
            font-weight: 600;
            color: #0a3a44;
            line-height: 1.2;
        }
        
        .date small {
            font-size: 24px;
            color: #006688;
            display: block;
            letter-spacing: 4px;
            margin-top: 5px;
        }
        
        .venue {
            font-size: 38px;
            color: #8b5a2b;
            margin: 15px 0 5px;
            font-weight: 500;
        }
        
        .address {
            font-size: 22px;
            color: #0a3a44;
            margin-bottom: 20px;
            font-style: italic;
            background: rgba(0, 102, 136, 0.08);
            padding: 8px 30px;
            display: inline-block;
            border-radius: 50px;
        }
        
        .time {
            font-size: 24px;
            color: #006688;
            margin: 20px 0;
            padding: 12px 30px;
            background: rgba(184, 134, 11, 0.1);
            display: inline-block;
            border-radius: 50px;
            font-weight: 500;
        }
        
        .rsvp {
            margin: 40px 0 30px;
            padding: 28px;
            background: linear-gradient(145deg, #0a3a44, #06323b);
            border-radius: 120px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
        }
        
        .rsvp-label {
            font-size: 18px;
            letter-spacing: 6px;
            color: #b8860b;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        
        .contact-button {
            display: inline-block;
            background: #b8860b;
            color: #0a3a44;
            padding: 18px 55px;
            border-radius: 70px;
            text-decoration: none;
            font-size: 22px;
            font-weight: 600;
            border: 3px solid #e8d9c4;
            transition: all 0.4s ease;
            box-shadow: 0 5px 20px rgba(184, 134, 11, 0.5);
        }
        
        .contact-button:hover {
            background: #e5b73b;
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 20px 30px #b8860b;
        }
        
        .organizer {
            margin-top: 25px;
            font-size: 22px;
            color: #0a3a44;
        }
        
        .organizer a {
            color: #006688;
            text-decoration: none;
            border-bottom: 2px dotted #b8860b;
            font-weight: 600;
            padding-bottom: 2px;
        }
        
        .organizer a:hover {
            color: #b8860b;
        }
        
        .footer {
            margin-top: 35px;
            padding-top: 20px;
            border-top: 3px solid #8b5a2b;
            font-size: 18px;
            color: #a67c52;
            display: flex;
            justify-content: center;
            gap: 40px;
            letter-spacing: 2px;
        }
        
        .footer span {
            color: #006688;
            font-weight: 600;
        }
        
        @media (max-width: 550px) {
            .card { padding: 40px 25px; }
            .couple { font-size: 48px; }
            .couple span { font-size: 36px; }
            .date { font-size: 40px; }
            .date small { font-size: 20px; }
            .venue { font-size: 30px; }
            .blessing { font-size: 22px; }
            .tumar-left, .tumar-right { opacity: 0.25; }
            .time { font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- Все орнаменты -->
        <div class="ornament-top" title="Баскур - традиционная узорная лента [citation:1]"></div>
        <div class="ornament-bottom" title="Баскур"></div>
        
        <div class="corner corner-tl" title="Қошқар мүйіз - бараний рог, символ достатка [citation:2]"></div>
        <div class="corner corner-tr" title="Қошқар мүйіз"></div>
        <div class="corner corner-bl" title="Қошқар мүйіз"></div>
        <div class="corner corner-br" title="Қошқар мүйіз"></div>
        
        <div class="tumar tumar-left" title="Тұмар - оберег"></div>
        <div class="tumar tumar-right" title="Тұмар - оберег"></div>
        
        <div class="content">
            <!-- Шаңырақ (символ дома, семьи, гостеприимства) -->
            <div class="shanyrak" title="Шаңырақ - символ дома и семьи">
                <div class="shanyrak-circle"></div>
                <div class="shanyrak-spoke"></div>
                <div class="shanyrak-spoke"></div>
                <div class="shanyrak-spoke"></div>
                <div class="shanyrak-spoke"></div>
                <div class="shanyrak-center"></div>
            </div>
            
            <div class="event-type">ҚАЗАҚ ТОЙЫ</div>
            
            <h1 class="couple">
                АЛМАС <span>&</span> ЖАНАР
            </h1>
            
            <div class="blessing">Шаңырағыңыз биік болсын</div>
            
            <div class="date-box">
                <div class="date">
                    15 АВГУСТА 2026
                    <small>суббота • 18:00</small>
                </div>
            </div>
            
            <div class="venue">«АЛТЫН ҰЯ»</div>
            <div class="address">Алматинская область, Карасайский район</div>
            
            <div class="time">
                Сбор гостей • 17:00
            </div>
            
            <div class="rsvp">
                <div class="rsvp-label">ПОДТВЕРДИТЕ УЧАСТИЕ</div>
                <a href="https://wa.me/77771234567?text=Здравствуйте!%20Подтверждаю%20участие%20на%20свадьбе%20АЛМАС%20и%20ЖАНАР%2015%20августа" target="_blank" class="contact-button">
                    WhatsApp
                </a>
            </div>
            
            <div class="organizer">
                Организатор: <a href="tel:+77771234567">Айгүл, +7 (777) 123-45-67</a>
            </div>
            
            <div class="footer">
                <span>АЛМАТЫ</span> • 2026 • <span>БЕРЕКЕ</span>
            </div>
        </div>
    </div>
</body>
</html>
